<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Blogging Website</title>
    <link rel="stylesheet" href="C:\Users\rehan\OneDrive\Desktop\Blogging-Website\styles\contactPageStyle.css">

<body>
    <header>
        <h1>Contact Us</h1>
        <nav>
            <ul>
                <li><a href="homePage.html">Home</a></li>
                <li><a href="blogPage.html">Blog</a></li>
                <li><a href="contactPage.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Get in Touch</h2>
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Blogging Website</p>
    </footer>
</body>
</html>
